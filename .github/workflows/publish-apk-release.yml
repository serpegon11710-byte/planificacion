name: Publish APK to Release

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact from build run
        uses: actions/download-artifact@v4
        with:
          name: planificacion-apk
          path: ./artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded files
        run: find ./artifact -type f

      - name: Publish APK as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-build-${{ github.event.workflow_run.run_number }}
          name: "APK build #${{ github.event.workflow_run.run_number }}"
          body: "Automated debug APK from CI build run #${{ github.event.workflow_run.run_number }}"
          prerelease: true
          files: artifact/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
