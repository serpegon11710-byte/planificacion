name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew (if present)
        run: |
          if [ -f mobile/android/gradlew ]; then chmod +x mobile/android/gradlew; fi

      - name: Ensure Gradle is available (if no wrapper present)
        run: |
          if [ ! -f mobile/android/gradlew ]; then
            sudo apt-get update && sudo apt-get install -y gradle
          fi

      - name: Build APK (assembleDebug)
        working-directory: mobile/android
        run: |
          # Try to use the Gradle wrapper if it exists, otherwise use system Gradle
          if [ -f ./gradlew ]; then
            ./gradlew assembleDebug --no-daemon
          else
            gradle assembleDebug --no-daemon
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: planificacion-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
