name: Generate Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Generate wrapper
        working-directory: mobile/android
        run: |
          gradle wrapper --gradle-version 7.4.2

      - name: Show generated files
        run: |
          ls -l mobile/android/gradle/wrapper || true
          ls -l mobile/android || true

      - name: Commit wrapper files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile/android/gradlew mobile/android/gradlew.bat mobile/android/gradle/wrapper/gradle-wrapper.jar mobile/android/gradle/wrapper/gradle-wrapper.properties || true
          if git diff --staged --quiet; then
            echo "No wrapper changes to commit"
          else
            git commit -m "chore: add generated gradle wrapper"
            git push origin HEAD:${{ github.ref_name }}
          fi
