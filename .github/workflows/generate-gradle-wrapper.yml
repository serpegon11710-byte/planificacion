name: Generate Gradle Wrapper

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Generate wrapper in temp dir and copy to project
        run: |
          # Create temporary dir and generate wrapper there to avoid evaluating project build scripts
          TMPDIR=$(mktemp -d)
          pushd "$TMPDIR"
          echo "Generating gradle wrapper in $TMPDIR"
          gradle wrapper --gradle-version 7.4.2
          ls -l gradle/wrapper || true
          # ensure destination exists
          mkdir -p $GITHUB_WORKSPACE/mobile/android/gradle/wrapper
          cp -v gradle/wrapper/gradle-wrapper.jar $GITHUB_WORKSPACE/mobile/android/gradle/wrapper/ || true
          cp -v gradle/wrapper/gradle-wrapper.properties $GITHUB_WORKSPACE/mobile/android/gradle/wrapper/ || true
          # also copy wrapper scripts (gradlew) from current repo if missing - create simple scripts
          if [ ! -f $GITHUB_WORKSPACE/mobile/android/gradlew ]; then
            cp -v $GITHUB_WORKSPACE/mobile/android/gradlew $GITHUB_WORKSPACE/mobile/android/ || true
          fi
          popd

      - name: Show copied files
        run: |
          ls -l mobile/android/gradle/wrapper || true

      - name: Commit wrapper files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile/android/gradle/wrapper/gradle-wrapper.jar mobile/android/gradle/wrapper/gradle-wrapper.properties || true
          if git diff --staged --quiet; then
            echo "No wrapper changes to commit"
          else
            git commit -m "chore: add generated gradle wrapper"
            git push origin HEAD:${{ github.ref_name }}
          fi
